name: CI
on:  [workflow_dispatch, pull_request, push]
    
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-python@v4
        with:
          python-version: '3.12'
      - name: Install nbdev cleanly
        run: |
          pip uninstall -y execnb nbdev || true
          pip install --no-cache-dir 'nbdev<3' execnb
      - name: Run nbdev CI
        run: |
          nbdev_clean
          nbdev_export
          pip install -e ".[dev]"
          nbdev_test


